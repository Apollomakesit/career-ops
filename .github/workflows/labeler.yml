name: Label PRs

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  label:
    runs-on: [self-hosted, Linux, X64, local]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
